name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Restore Firebase config
        run: |
          if [ -z "${FIREBASE_APP_CONFIG_JSON_B64}" ]; then
            echo "Missing FIREBASE_APP_CONFIG_JSON_B64 secret." >&2
            exit 1
          fi
          printf '%s' "${FIREBASE_APP_CONFIG_JSON_B64}" | base64 -d > firebase-applet-config.json
        env:
          FIREBASE_APP_CONFIG_JSON_B64: ${{ secrets.FIREBASE_APP_CONFIG_JSON_B64 }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUILDWITHAI_FUNNAB }}
          projectId: buildwithai-funnab
          channelId: live
